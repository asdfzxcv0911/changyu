<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>乙昌水箱行 - 叫貨系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 隱藏滾動條但保持可滾動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 確保輸入框在手機上不會自動放大 */
        input, select { font-size: 16px !important; }
        
        /* 畫面切換動畫 */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 flex justify-center h-screen w-screen overflow-hidden text-gray-800">

    <!-- 模擬手機螢幕的容器 -->
    <div class="w-full max-w-md h-full bg-white shadow-xl relative flex flex-col">
        
        <!-- 頂部導航列 -->
        <header class="bg-blue-600 text-white p-4 shadow-md z-10 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider"><i class="fa-solid fa-water mr-2"></i>乙昌水箱</h1>
        </header>

        <!-- 內容區域 -->
        <main class="flex-1 overflow-y-auto no-scrollbar p-5 relative pb-6">
            
            <!-- Step 1: 登入/客戶資料 -->
            <div id="step-1" class="fade-in block space-y-5 mt-4">
                <div class="text-center mb-8">
                    <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 shadow-inner">
                        <i class="fa-solid fa-car-side text-3xl"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">歡迎使用叫貨系統</h2>
                    <p class="text-gray-500 text-sm mt-1">請先填寫您的基本資料以開始選購</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">保養廠 / 公司名稱 <span class="text-red-500">*</span></label>
                        <input type="text" id="company" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="例如：日盛保養廠">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">聯絡電話 <span class="text-red-500">*</span></label>
                        <input type="tel" id="phone" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="例如：0912345678">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">電子信箱 (選填)</label>
                        <input type="email" id="email" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="若有填寫，將會傳送訂單明細至此信箱">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">送貨地址 (選填)</label>
                        <input type="text" id="address" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="例如：台北市中山區某某路1號">
                    </div>
                </div>

                <button onclick="goToStep(2)" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-lg mt-8 shadow-md transition transform active:scale-95">
                    開始叫貨 <i class="fa-solid fa-arrow-right ml-1"></i>
                </button>

                <!-- 服務專員聯絡資訊 (長輩友善大字體對齊版) -->
                <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                    <p class="text-xs text-gray-500 mb-3"><i class="fa-solid fa-circle-info mr-1 text-gray-400"></i> 遇到問題或需查詢進度？</p>
                    <div class="text-lg font-bold text-gray-700 mb-4"><i class="fa-solid fa-headset mr-1 text-blue-600"></i> 服務專員 莊小姐</div>
                    <div class="flex flex-col space-y-3 px-2">
                        <a href="tel:073729477" class="w-full flex items-center justify-center bg-blue-50 border border-blue-100 text-blue-700 py-3.5 rounded-2xl font-bold shadow-sm hover:bg-blue-100 transition active:scale-95 text-xl tracking-wider">
                            <div class="flex items-center w-[165px] justify-start">
                                <i class="fa-solid fa-phone mr-3 text-blue-500"></i> 
                                <span>07-3729477</span>
                            </div>
                        </a>
                        <a href="tel:0989251296" class="w-full flex items-center justify-center bg-blue-50 border border-blue-100 text-blue-700 py-3.5 rounded-2xl font-bold shadow-sm hover:bg-blue-100 transition active:scale-95 text-xl tracking-wider">
                            <div class="flex items-center w-[165px] justify-start">
                                <i class="fa-solid fa-phone mr-3 text-blue-500"></i> 
                                <span>0989251296</span>
                            </div>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Step 2: 選貨頁面 -->
            <div id="step-2" class="fade-in hidden space-y-5">
                <div class="flex justify-between items-center mb-2">
                    <div class="flex items-center">
                        <button onclick="goToStep(1)" class="text-gray-500 hover:text-blue-600 mr-3 transition-colors">
                            <i class="fa-solid fa-arrow-left text-lg"></i>
                        </button>
                        <h2 class="text-xl font-bold border-l-4 border-blue-600 pl-2">選擇車款與水箱</h2>
                    </div>
                    <span id="welcome-name" class="text-sm text-gray-500 font-medium"></span>
                </div>

                <!-- 動態下拉選單區 -->
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">1. 選擇廠牌</label>
                        <select id="select-brand" onchange="onBrandChange()" class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none appearance-none">
                            <option value="">請先選擇廠牌...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">2. 選擇車型</label>
                        <select id="select-model" onchange="onModelChange()" disabled class="w-full border border-gray-300 rounded-lg p-3 bg-gray-100 text-gray-500 outline-none appearance-none disabled:opacity-70">
                            <option value="">請先選擇廠牌</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">3. 選擇年份</label>
                        <select id="select-year" onchange="onYearChange()" disabled class="w-full border border-gray-300 rounded-lg p-3 bg-gray-100 text-gray-500 outline-none appearance-none disabled:opacity-70">
                            <option value="">請先選擇廠牌</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">4. 選擇材料種類</label>
                        <select id="select-type" onchange="onTypeChange()" disabled class="w-full border border-gray-300 rounded-lg p-3 bg-gray-100 text-gray-500 outline-none appearance-none disabled:opacity-70">
                            <option value="">請先選擇廠牌</option>
                        </select>
                    </div>
                </div>

                <!-- 產品資訊卡片 -->
                <div id="product-card" class="hidden bg-blue-50 p-4 rounded-xl border border-blue-100 shadow-sm transition-all mt-4">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span id="p-id" class="text-xs bg-blue-200 text-blue-800 px-2 py-1 rounded font-mono mb-1 inline-block"></span>
                            <h3 id="p-spec" class="text-lg font-bold text-gray-800"></h3>
                        </div>
                        <div class="text-right">
                            <span class="text-sm text-gray-500">單價</span>
                            <div id="p-price" class="text-xl font-bold text-blue-600"></div>
                        </div>
                    </div>
                    
                    <div id="p-image-container" class="hidden w-full h-48 bg-white rounded-lg mb-3 flex items-center justify-center overflow-hidden border border-blue-100 shadow-inner">
                        <img id="p-image" src="" alt="產品圖片" class="max-h-full max-w-full object-contain">
                    </div>

                    <div class="flex items-center justify-between border-t border-blue-200 pt-3 mt-2">
                        <div class="flex items-center">
                            <i class="fa-solid fa-box-open text-gray-400 mr-2"></i>
                            <span class="text-sm text-gray-600">目前庫存：</span>
                            <span id="p-stock" class="font-bold text-lg mx-1"></span>
                            <span class="text-sm text-gray-600">個</span>
                        </div>
                        
                        <div class="flex items-center bg-white border border-gray-300 rounded-lg overflow-hidden h-9">
                            <button onclick="changeQty(-1)" class="w-9 h-full flex justify-center items-center bg-gray-100 hover:bg-gray-200 text-gray-600 transition active:bg-gray-300">-</button>
                            <input type="number" id="order-qty" value="1" min="1" class="w-12 h-full text-center border-x border-gray-300 focus:outline-none font-bold text-gray-700" readonly>
                            <button onclick="changeQty(1)" class="w-9 h-full flex justify-center items-center bg-gray-100 hover:bg-gray-200 text-gray-600 transition active:bg-gray-300">+</button>
                        </div>
                    </div>

                    <button id="add-cart-btn" onclick="addToCart()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg mt-4 shadow transition transform active:scale-95 flex justify-center items-center">
                        <i class="fa-solid fa-cart-plus mr-2"></i> 加入叫貨單
                    </button>
                </div>
            </div>

            <!-- Step 3: 購物車與結帳 -->
            <div id="step-3" class="fade-in hidden space-y-4 pb-20">
                <div class="flex items-center mb-4">
                    <button onclick="goToStep(2)" class="text-gray-500 hover:text-blue-600 mr-3">
                        <i class="fa-solid fa-arrow-left text-lg"></i>
                    </button>
                    <h2 class="text-xl font-bold">確認叫貨單</h2>
                </div>

                <div id="cart-items" class="space-y-3">
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mt-4">
                    <div class="flex justify-between items-center text-gray-600 mb-2">
                        <span>共計品項：</span>
                        <span id="total-items" class="font-bold">0 件</span>
                    </div>
                    <div class="flex justify-between items-center text-lg">
                        <span class="font-bold text-gray-800">總金額：</span>
                        <span id="total-price" class="font-bold text-red-500 text-xl">$0</span>
                    </div>
                </div>

                <div class="bg-gray-50 p-4 rounded-xl text-sm border border-gray-200 mb-6">
                    <p class="text-gray-500 mb-1"><i class="fa-solid fa-building mr-1"></i> <span id="confirm-company"></span></p>
                    <p class="text-gray-500 mb-1"><i class="fa-solid fa-map-location-dot mr-1"></i> 送貨地址：<br><strong id="confirm-address" class="text-gray-700"></strong></p>
                    <p class="text-gray-500"><i class="fa-solid fa-envelope mr-1"></i> 電子信箱：<br><strong id="confirm-email" class="text-gray-700"></strong></p>
                </div>

                <!-- 備註欄 -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2"><i class="fa-solid fa-pen-to-square mr-1 text-gray-400"></i> 訂單備註 (選填)</label>
                    <textarea id="order-remarks" rows="2" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition resize-none text-sm" placeholder="有什麼想特別交代的嗎？(例如：請於下午配送、需打統編等)"></textarea>
                </div>

                <button onclick="submitOrder()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition transform active:scale-95 text-lg flex justify-center items-center">
                    <i class="fa-solid fa-paper-plane mr-2"></i> 確認送出訂單
                </button>
            </div>

            <!-- Step 4: 歷史紀錄 -->
            <div id="step-4" class="fade-in hidden space-y-5 h-full flex flex-col items-center justify-center text-center pb-20 mt-10">
                <div class="w-20 h-20 bg-gray-100 text-gray-400 rounded-full flex items-center justify-center mb-4 mx-auto">
                    <i class="fa-solid fa-person-digging text-3xl"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-700">歷史紀錄功能開發中</h2>
                <p class="text-gray-500 text-sm mt-2">未來您將可以在這裡<br>快速查看所有歷史叫貨明細！</p>
            </div>

        </main>

        <!-- 底部導航列 -->
        <nav class="bg-white border-t border-gray-200 flex justify-around items-center pt-2 pb-3 shadow-[0_-4px_10px_rgba(0,0,0,0.03)] z-30">
            <button onclick="goToStep(1)" id="tab-1" class="flex flex-col items-center p-1 text-blue-600 w-1/4 transition-colors">
                <i class="fa-solid fa-house text-xl mb-1"></i>
                <span class="text-[10px] font-bold">首頁</span>
            </button>
            <button onclick="goToStep(2)" id="tab-2" class="flex flex-col items-center p-1 text-gray-400 hover:text-blue-500 w-1/4 transition-colors">
                <i class="fa-solid fa-magnifying-glass text-xl mb-1"></i>
                <span class="text-[10px] font-bold">找水箱</span>
            </button>
            <button onclick="goToStep(3)" id="tab-3" class="flex flex-col items-center p-1 text-gray-400 hover:text-blue-500 w-1/4 transition-colors relative">
                <i class="fa-solid fa-bag-shopping text-xl mb-1"></i>
                <span class="text-[10px] font-bold">清單</span>
                <span id="nav-cart-badge" class="absolute top-0 right-4 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full hidden border border-white">0</span>
            </button>
            <button onclick="goToStep(4)" id="tab-4" class="flex flex-col items-center p-1 text-gray-400 hover:text-blue-500 w-1/4 transition-colors">
                <i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i>
                <span class="text-[10px] font-bold">紀錄</span>
            </button>
        </nav>

        <!-- 客製化彈窗 (Modal) -->
        <div id="custom-modal" class="hidden absolute inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center p-4">
            <div class="bg-white w-full max-w-sm rounded-xl shadow-2xl p-6 transform transition-all scale-95 opacity-0" id="modal-content">
                <div class="text-center mb-4">
                    <div id="modal-icon" class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-3">
                        <i class="fa-solid fa-triangle-exclamation text-red-600 text-xl"></i>
                    </div>
                    <h3 id="modal-title" class="text-lg leading-6 font-medium text-gray-900">提示</h3>
                    <div class="mt-2 text-left bg-gray-50 p-3 rounded-lg border border-gray-200">
                        <p id="modal-message" class="text-sm text-gray-600 break-words whitespace-pre-wrap">訊息內容</p>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none sm:text-sm">
                    我知道了
                </button>
            </div>
        </div>
        
        <!-- 載入中遮罩 -->
        <div id="loading-overlay" class="hidden absolute inset-0 bg-white bg-opacity-80 z-50 flex flex-col justify-center items-center">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-600 mb-3"></i>
            <p class="text-gray-600 font-medium">訂單處理中，請稍候...</p>
        </div>

    </div>

    <script>
        // --- 狀態管理 ---
        let userInfo = { company: '', phone: '', address: '', email: '', remarks: '' };
        let cart = [];
        let currentStep = 1;
        let selectedProduct = null;
        let inventoryData = []; 

        // ⚠️ 您的後台網址
        const API_URL = 'https://script.google.com/macros/s/AKfycbwOF2ZJerpBzTyJB6qwxVvmR2AW32Jbl2HEOuU2ZK46cw2BGnEKkWL_K9fCFhp7L8KAOA/exec';
        
        const mockInventoryData = [
            { id: "R-001", brand: "TOYOTA", model: "ALTIS", year: "2018-2022", type: "水箱", spec: "雙排鋁製水箱", image: "", stock: 15, price: 2500 },
            { id: "R-004", brand: "HONDA", model: "CR-V", year: "2017-2023", type: "水箱", spec: "原廠型水箱", image: "", stock: 0, price: 2800 }
        ];

        // --- 初始化 (加入深層除錯與強制排毒) ---
        document.addEventListener('DOMContentLoaded', () => {
            // 強制清除瀏覽器的舊暫存，避免被假資料卡住 (保留此行以便除錯與抓取新版庫存)
            localStorage.removeItem('yichang_inventory_cache');

            // 【新增功能】：自動載入客人上次填寫的資料 (秒填寫)
            const savedUserInfo = localStorage.getItem('yichang_user_info');
            if (savedUserInfo) {
                try {
                    const parsedUser = JSON.parse(savedUserInfo);
                    document.getElementById('company').value = parsedUser.company || '';
                    document.getElementById('phone').value = parsedUser.phone || '';
                    document.getElementById('email').value = parsedUser.email || '';
                    document.getElementById('address').value = parsedUser.address || '';
                } catch(e) {
                    console.error("載入客戶自動記憶資料失敗", e);
                }
            }

            // 先用模擬資料墊檔，確保畫面絕對有東西顯示
            inventoryData = mockInventoryData;
            populateBrands();

            // 開始從 Google Sheets 抓取最新資料
            if (API_URL.startsWith('http')) {
                fetch(API_URL)
                    .then(response => response.text()) 
                    .then(text => {
                        try {
                            const data = JSON.parse(text);

                            if (data && data.length > 0 && data[0].error) {
                                showModal('後台設定錯誤 (代碼 A)', 'Google 試算表回傳錯誤訊息：\n' + data[0].error + '\n\n👉 請檢查試算表底下的分頁名稱是否為「庫存總表」，不能有空白字元！', 'warning');
                                return;
                            }

                            if(data && data.length > 0) {
                                if (data[0]['系統編號'] === undefined) {
                                    const currentHeaders = Object.keys(data[0]).join(', ');
                                    showModal('標題名稱錯誤 (代碼 B)', '找不到「系統編號」這個標題！\n\n👉 試算表目前的標題是：\n' + currentHeaders + '\n\n請去試算表檢查標題，確認前後沒有多按到空白鍵。', 'warning');
                                    return;
                                }

                                const newData = data.filter(row => row['系統編號']).map(row => ({
                                    id: String(row['系統編號']).trim(),
                                    brand: String(row['廠牌']).trim(),
                                    model: String(row['車型']).trim(),
                                    year: String(row['年份']).trim(),
                                    type: row['材料種類'] ? String(row['材料種類']).trim() : '水箱',
                                    spec: String(row['水箱規格']).trim(),
                                    image: row['圖片網址'] || '',
                                    stock: parseInt(row['目前庫存量']) || 0,
                                    price: parseInt(row['單價']) || 0
                                }));
                                
                                if (newData.length > 0) {
                                    inventoryData = newData; 
                                    populateBrands(); 
                                    
                                    // showModal('連線成功 🎉', `已成功從您的 Google 後台抓取 ${newData.length} 筆最新庫存資料！您可以開始測試了。`, 'success');
                                }
                            } else {
                                showModal('試算表空白 (代碼 C)', '已成功連線後台，但「庫存總表」裡面完全沒有填寫水箱資料喔！', 'info');
                            }
                        } catch (e) {
                            console.error("解析失敗，收到的內容為:", text.substring(0, 150) + "...");
                            showModal('權限設定錯誤 (代碼 E)', 'Google 擋住了連線並要求登入！(回傳了網頁而不是資料)\n\n👉 這 100% 是因為您在部署時沒有設定好權限。\n\n請回到 Apps Script：\n1. 點選「管理部署作業」\n2. 編輯並選擇「新版本」\n3. 【誰可以存取】一定要改成【所有人 (Anyone)】\n4. 點擊部署。', 'warning');
                        }
                    })
                    .catch(error => {
                        console.error('連線失敗:', error);
                        showModal('後台連線遭阻擋 (代碼 D)', '無法連線到 Google 後台取得最新資料！\n\n可能原因：網址填錯或網路不穩。', 'warning');
                    });
            }
        });

        // --- UI 控制邏輯 ---
        function goToStep(step) {
            if (step > 1) {
                const company = document.getElementById('company').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const address = document.getElementById('address').value.trim();
                const email = document.getElementById('email').value.trim();
                const remarks = document.getElementById('order-remarks') ? document.getElementById('order-remarks').value.trim() : '';

                if (!company || !phone) {
                    showModal('資料不完整', '請先在首頁填寫您的「保養廠名稱」與「聯絡電話」，才能開始找水箱與叫貨喔！', 'warning');
                    return; 
                }
                
                if (email && !/^\S+@\S+\.\S+$/.test(email)) {
                    showModal('Email 格式錯誤', '請輸入正確的電子信箱格式。', 'warning');
                    return; 
                }

                userInfo = { company, phone, address, email, remarks };
                
                // 【新增功能】：將客人的資料記憶在手機裡，下次打開就不用重打了！
                localStorage.setItem('yichang_user_info', JSON.stringify({ company, phone, address, email }));
                
                document.getElementById('welcome-name').innerText = company;
                document.getElementById('confirm-company').innerText = company + ' (' + phone + ')';
                document.getElementById('confirm-address').innerText = address ? address : '(未提供，將以電話聯繫確認)';
                document.getElementById('confirm-email').innerText = email ? email : '(未提供)';
            }

            if (step === 3 && cart.length === 0) {
                showModal('購物車是空的', '請先選擇需要的商品加入清單。', 'warning');
                return;
            }

            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.add('hidden');
            document.getElementById('step-4').classList.add('hidden');
            
            document.getElementById(`step-${step}`).classList.remove('hidden');
            document.getElementById(`step-${step}`).classList.add('fade-in');

            currentStep = step;
            updateUIElements();

            if (step === 3) renderCart();
        }

        function updateUIElements() {
            for (let i = 1; i <= 4; i++) {
                const tab = document.getElementById(`tab-${i}`);
                if (tab) {
                    if (i === currentStep) {
                        tab.classList.remove('text-gray-400');
                        tab.classList.add('text-blue-600');
                    } else {
                        tab.classList.remove('text-blue-600');
                        tab.classList.add('text-gray-400');
                    }
                }
            }
        }

        // --- Step 2: 動態下拉選單邏輯 ---
        function getUniqueValues(key, filterFn = () => true) {
            return [...new Set(inventoryData.filter(filterFn).map(item => item[key]))];
        }

        function populateBrands() {
            const brands = getUniqueValues('brand');
            const select = document.getElementById('select-brand');
            select.innerHTML = '<option value="">請選擇廠牌...</option>';
            brands.forEach(b => select.innerHTML += `<option value="${b}">${b}</option>`);
        }

        function onBrandChange() {
            const brand = document.getElementById('select-brand').value;
            const modelSelect = document.getElementById('select-model');
            const yearSelect = document.getElementById('select-year');
            const typeSelect = document.getElementById('select-type');
            hideProductCard();

            if (!brand) {
                modelSelect.disabled = true;
                modelSelect.innerHTML = '<option value="">請先選擇廠牌</option>';
                modelSelect.classList.replace('bg-white', 'bg-gray-100');
                yearSelect.disabled = true;
                yearSelect.innerHTML = '<option value="">請先選擇廠牌</option>';
                yearSelect.classList.replace('bg-white', 'bg-gray-100');
                typeSelect.disabled = true;
                typeSelect.innerHTML = '<option value="">請先選擇廠牌</option>';
                typeSelect.classList.replace('bg-white', 'bg-gray-100');
                return;
            }

            const models = getUniqueValues('model', item => item.brand === brand);
            modelSelect.innerHTML = '<option value="">請選擇車型...</option>';
            models.forEach(m => modelSelect.innerHTML += `<option value="${m}">${m}</option>`);
            
            modelSelect.disabled = false;
            modelSelect.classList.replace('bg-gray-100', 'bg-white');
            
            yearSelect.disabled = true;
            yearSelect.innerHTML = '<option value="">請先選擇車型</option>';
            yearSelect.classList.replace('bg-white', 'bg-gray-100');
            
            typeSelect.disabled = true;
            typeSelect.innerHTML = '<option value="">請先選擇車型</option>';
            typeSelect.classList.replace('bg-white', 'bg-gray-100');
        }

        function onModelChange() {
            const brand = document.getElementById('select-brand').value;
            const model = document.getElementById('select-model').value;
            const yearSelect = document.getElementById('select-year');
            const typeSelect = document.getElementById('select-type');
            hideProductCard();

            if (!model) {
                yearSelect.disabled = true;
                yearSelect.innerHTML = '<option value="">請先選擇車型</option>';
                yearSelect.classList.replace('bg-white', 'bg-gray-100');
                typeSelect.disabled = true;
                typeSelect.innerHTML = '<option value="">請先選擇車型</option>';
                typeSelect.classList.replace('bg-white', 'bg-gray-100');
                return;
            }

            const years = getUniqueValues('year', item => item.brand === brand && item.model === model);
            yearSelect.innerHTML = '<option value="">請選擇年份...</option>';
            years.forEach(y => yearSelect.innerHTML += `<option value="${y}">${y}</option>`);
            
            yearSelect.disabled = false;
            yearSelect.classList.replace('bg-gray-100', 'bg-white');
            
            typeSelect.disabled = true;
            typeSelect.innerHTML = '<option value="">請先選擇年份</option>';
            typeSelect.classList.replace('bg-white', 'bg-gray-100');
        }

        function onYearChange() {
            const brand = document.getElementById('select-brand').value;
            const model = document.getElementById('select-model').value;
            const year = document.getElementById('select-year').value;
            const typeSelect = document.getElementById('select-type');
            hideProductCard();

            if (!year) {
                typeSelect.disabled = true;
                typeSelect.innerHTML = '<option value="">請先選擇年份</option>';
                typeSelect.classList.replace('bg-white', 'bg-gray-100');
                return;
            }

            const types = getUniqueValues('type', item => item.brand === brand && item.model === model && item.year === year);
            typeSelect.innerHTML = '<option value="">請選擇材料種類...</option>';
            types.forEach(t => typeSelect.innerHTML += `<option value="${t}">${t}</option>`);
            
            typeSelect.disabled = false;
            typeSelect.classList.replace('bg-gray-100', 'bg-white');
        }

        function onTypeChange() {
            const brand = document.getElementById('select-brand').value;
            const model = document.getElementById('select-model').value;
            const year = document.getElementById('select-year').value;
            const type = document.getElementById('select-type').value;

            if (brand && model && year && type) {
                const product = inventoryData.find(p => p.brand === brand && p.model === model && p.year === year && p.type === type);
                if (product) {
                    showProductCard(product);
                }
            } else {
                hideProductCard();
            }
        }

        // --- 顯示產品與數量選擇 ---
        function showProductCard(product) {
            selectedProduct = product;
            document.getElementById('product-card').classList.remove('hidden');
            document.getElementById('product-card').classList.add('fade-in');
            
            document.getElementById('p-id').innerText = product.id;
            document.getElementById('p-spec').innerText = product.spec;
            document.getElementById('p-price').innerText = `$${product.price.toLocaleString()}`;
            
            const imgContainer = document.getElementById('p-image-container');
            const imgEl = document.getElementById('p-image');
            if (product.image) {
                imgEl.src = product.image;
                imgContainer.classList.remove('hidden');
            } else {
                imgEl.src = '';
                imgContainer.classList.add('hidden');
            }
            
            const stockEl = document.getElementById('p-stock');
            const btnEl = document.getElementById('add-cart-btn');
            
            stockEl.innerText = product.stock;
            document.getElementById('order-qty').value = 1;

            if (product.stock <= 0) {
                stockEl.classList.add('text-red-500');
                btnEl.disabled = true;
                btnEl.classList.replace('bg-blue-600', 'bg-gray-400');
                btnEl.classList.replace('hover:bg-blue-700', 'hover:bg-gray-400');
                btnEl.innerHTML = '<i class="fa-solid fa-ban mr-2"></i> 目前缺貨中';
            } else {
                stockEl.classList.remove('text-red-500');
                btnEl.disabled = false;
                btnEl.classList.replace('bg-gray-400', 'bg-blue-600');
                btnEl.classList.replace('hover:bg-gray-400', 'hover:bg-blue-700');
                btnEl.innerHTML = '<i class="fa-solid fa-cart-plus mr-2"></i> 加入叫貨單';
            }
        }

        function hideProductCard() {
            selectedProduct = null;
            document.getElementById('product-card').classList.add('hidden');
        }

        function changeQty(delta) {
            if (!selectedProduct || selectedProduct.stock <= 0) return;
            const input = document.getElementById('order-qty');
            let newVal = parseInt(input.value) + delta;
            
            const MAX_QTY = 6; 
            const limit = Math.min(selectedProduct.stock, MAX_QTY); 
            
            if (newVal < 1) newVal = 1;
            
            if (newVal > limit) {
                if (selectedProduct.stock < MAX_QTY) {
                    showModal('庫存不足', `目前 ${selectedProduct.spec} 最多僅有 ${selectedProduct.stock} 個庫存。`, 'info');
                } else {
                    showModal('數量限制', `為了確保大家都能叫到貨，每種品項單次最多只能訂購 ${MAX_QTY} 個喔。`, 'info');
                }
                newVal = limit;
            }
            
            input.value = newVal;
        }

        // --- 加入購物車 ---
        function addToCart() {
            if (!selectedProduct || selectedProduct.stock <= 0) return;
            
            const qty = parseInt(document.getElementById('order-qty').value);
            const MAX_QTY = 6; 
            
            const existingItem = cart.find(item => item.product.id === selectedProduct.id);
            if (existingItem) {
                const limit = Math.min(selectedProduct.stock, MAX_QTY);
                
                if (existingItem.qty + qty > limit) {
                    if (selectedProduct.stock < MAX_QTY && existingItem.qty + qty > selectedProduct.stock) {
                        showModal('超出庫存', `您購物車內已有該商品，合計數量超出現有庫存 (${selectedProduct.stock})。`, 'warning');
                    } else {
                        showModal('數量限制', `您購物車內已有該商品，每種品項合計最多只能訂購 ${MAX_QTY} 個。`, 'warning');
                    }
                    return;
                }
                existingItem.qty += qty;
            } else {
                cart.push({ product: selectedProduct, qty: qty });
            }

            updateCartBadges();
            showModal('加入成功', `已將 ${qty} 個 ${selectedProduct.spec} 加入清單。`, 'success');
            
            setTimeout(() => {
                // 💡 修改這裡：不再清空廠牌與車型，只將數量恢復為 1
                // 這樣客人就可以直接去改「材料種類」繼續加購這台車的其他零件！
                document.getElementById('order-qty').value = 1;
                updateUIElements();
            }, 500);
        }

        function updateCartBadges() {
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            const navBadge = document.getElementById('nav-cart-badge');
            
            navBadge.innerText = totalItems;
            
            if (totalItems > 0) {
                navBadge.classList.remove('hidden');
            } else {
                navBadge.classList.add('hidden');
            }
        }

        // --- Step 3: 渲染購物車 ---
        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            
            let totalPrice = 0;
            let totalQty = 0;

            cart.forEach((item, index) => {
                const subtotal = item.product.price * item.qty;
                totalPrice += subtotal;
                totalQty += item.qty;

                const imgHtml = item.product.image 
                    ? `<img src="${item.product.image}" class="w-16 h-16 object-cover rounded-lg border border-gray-200 mr-3 shrink-0">`
                    : `<div class="w-16 h-16 bg-gray-100 rounded-lg border border-gray-200 mr-3 flex items-center justify-center shrink-0"><i class="fa-solid fa-image text-gray-300"></i></div>`;

                container.innerHTML += `
                    <div class="bg-white p-3 rounded-xl border border-gray-200 shadow-sm flex items-center justify-between">
                        <div class="flex items-center flex-1 overflow-hidden">
                            ${imgHtml}
                            <div class="min-w-0">
                                <div class="text-xs text-gray-500 mb-1 truncate">${item.product.brand} ${item.product.model} (${item.product.year}) - <span class="text-blue-600 font-bold">${item.product.type}</span></div>
                                <div class="font-bold text-gray-800 truncate">${item.product.spec}</div>
                                <div class="text-sm text-blue-600 mt-1">$${item.product.price.toLocaleString()} x ${item.qty}</div>
                            </div>
                        </div>
                        <div class="flex flex-col items-end ml-2 shrink-0">
                            <div class="font-bold text-gray-800 mb-2">$${subtotal.toLocaleString()}</div>
                            <button onclick="removeFromCart(${index})" class="text-xs text-red-500 bg-red-50 px-2 py-1 rounded hover:bg-red-100">
                                <i class="fa-solid fa-trash-can mr-1"></i> 移除
                            </button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('total-items').innerText = `${totalQty} 件`;
            document.getElementById('total-price').innerText = `$${totalPrice.toLocaleString()}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartBadges();
            if (cart.length === 0) {
                goToStep(2); 
            } else {
                renderCart();
            }
        }

        // --- 送出訂單 ---
        function submitOrder() {
            userInfo.company = document.getElementById('company').value.trim();
            userInfo.phone = document.getElementById('phone').value.trim();
            userInfo.address = document.getElementById('address').value.trim();
            userInfo.email = document.getElementById('email').value.trim();
            userInfo.remarks = document.getElementById('order-remarks').value.trim(); 

            if (!userInfo.company || !userInfo.phone) {
                showModal('資料不完整', '請先至「首頁」填寫您的保養廠名稱與聯絡電話，以便為您安排出貨！', 'warning');
                goToStep(1);
                return;
            }

            if (cart.length === 0) {
                showModal('購物車是空的', '請先選擇需要的商品加入清單。', 'warning');
                goToStep(2);
                return;
            }

            document.getElementById('loading-overlay').classList.remove('hidden');

            const orderPayload = {
                userInfo: userInfo,
                cart: cart.map(c => ({
                    id: c.product.id,
                    brand: c.product.brand, 
                    model: c.product.model, 
                    year: c.product.year,   
                    type: c.product.type,   
                    spec: c.product.spec,
                    qty: c.qty,
                    price: c.product.price,
                    subtotal: c.product.price * c.qty
                })),
                total: cart.reduce((sum, c) => sum + (c.product.price * c.qty), 0),
                timestamp: new Date().toISOString()
            };

            if (API_URL.startsWith('http') && !API_URL.includes('你的_GAS_網頁應用程式網址_請貼在這裡')) {
                fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(orderPayload)
                })
                .then(response => response.json())
                .then(data => {
                    document.getElementById('loading-overlay').classList.add('hidden');
                    
                    if (data.success) {
                        let successMsg = '我們已收到您的叫貨單，稍後將為您安排出貨。';
                        if (userInfo.email) {
                            successMsg = `我們已收到您的叫貨單，訂單明細已發送至您的信箱 (${userInfo.email})，請查收！稍後將為您安排出貨。`;
                        }
                        showModal('訂單送出成功！', successMsg, 'success');
                        resetAfterSubmit();
                    } else {
                        showModal('發生錯誤', '系統處理訂單時發生問題：' + data.error, 'warning');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('loading-overlay').classList.add('hidden');
                    showModal('連線失敗', '訂單無法送出，請檢查網路連線。', 'warning');
                });

            } else {
                setTimeout(() => {
                    document.getElementById('loading-overlay').classList.add('hidden');
                    
                    let successMsg = '(此為測試模式) 我們已收到您的叫貨單，稍後將為您安排出貨。';
                    if (userInfo.email) {
                        successMsg = `(此為測試模式) 我們已收到叫貨單！\n真實環境下，系統會自動將明細發送至：\n${userInfo.email}`;
                    }
                    showModal('訂單送出成功！', successMsg, 'success');
                    
                    resetAfterSubmit();
                }, 2000);
            }
        }

        function resetAfterSubmit() {
            cart = [];
            updateCartBadges();
            document.getElementById('select-brand').value = '';
            onBrandChange();
            
            setTimeout(() => {
                closeModal();
                goToStep(1);
                // 💡 既然已經有記憶功能，送出訂單後就不清空客人的基本資料了，方便他們連續叫貨
                document.getElementById('order-remarks').value = ''; // 只清空備註
            }, 3000);
        }

        // --- 客製化 Modal 系統 ---
        function showModal(title, message, type = 'info') {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            const iconEl = document.getElementById('modal-icon');
            
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            
            if (type === 'warning') {
                iconEl.className = 'mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-yellow-100 mb-3 text-yellow-600';
                iconEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-xl"></i>';
            } else if (type === 'success') {
                iconEl.className = 'mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-3 text-green-600';
                iconEl.innerHTML = '<i class="fa-solid fa-check text-xl"></i>';
            } else {
                iconEl.className = 'mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-blue-100 mb-3 text-blue-600';
                iconEl.innerHTML = '<i class="fa-solid fa-circle-info text-xl"></i>';
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        }
    </script>
</body>
</html>
